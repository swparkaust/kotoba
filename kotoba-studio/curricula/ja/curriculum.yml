language:
  code: ja
  name: Japanese
  native_name: 日本語
  script_systems:
  - hiragana
  - katakana
  - kanji
  official_curriculum: MEXT Kokugo
  equivalence_test: JLPT
  no_english_rule: true
  classical_variant: classical_japanese
  kanji_note: Complete kanji lists per grade are in kanji_grades.yml. Curriculum target_items contain representative samples for lesson planning; the content generation pipeline references kanji_grades.yml
    for the full set.
  generation_config:
    exercises_per_lesson: 20
    target_total_lessons: 1400
    vocabulary_targets:
      N5: 800
      N4: 1500
      N3: 3750
      N2: 6000
      N1: 10000
    grammar_targets:
      N5: 80
      N4: 170
      N3: 300
      N2: 500
      N1: 800
    reading_speed_targets:
      N5: 100 chars/min
      N4: 200 chars/min
      N3: 300 chars/min
      N2: 400 chars/min
      N1: 500 chars/min
  library_progression:
    levels_1_2:
      type: graded_reader
      word_count: 100-500
      topics: daily life, animals, seasons
    levels_3_4:
      type: graded_reader
      word_count: 500-1500
      topics: folk tales, school life, family
    levels_5_6:
      type: graded_reader
      word_count: 1500-3000
      topics: history, science, social issues
    levels_7_8:
      type: adapted_text
      word_count: 3000-6000
      topics: news, essays, short stories
    levels_9_10:
      type: authentic_text
      word_count: 6000-15000
      topics: novels, academic articles, business documents
    levels_11_12:
      type: authentic_text
      word_count: 15000+
      topics: classical literature, research papers, contemporary media
levels:
- position: 1
  title: Level 1 — Hiragana
  grade_equivalent: Grade 1 (first half)
  test_equivalent: Pre-N5
  description: All 46 hiragana, basic greetings, numbers 1-10, self-introduction
  teaching_band: beginner
  units:
  - position: 1
    title: Unit 1 — Vowels (あいうえお)
    description: The five vowel sounds
    target_items:
      characters:
      - あ
      - い
      - う
      - え
      - お
      vocabulary:
      - あめ
      - いぬ
      - うま
      - えき
      - おに
      grammar: []
    lessons:
    - position: 1
      title: Lesson 1 — あ (a)
      skill_type: character_intro
      objectives:
      - Recognize あ by sight and sound
      - Trace あ with correct stroke order
      - 'Associate あ with vocabulary: あめ (rain)'
    - position: 2
      title: Lesson 2 — い (i)
      skill_type: character_intro
      objectives:
      - Recognize い by sight and sound
      - Trace い with correct stroke order
      - 'Associate い with vocabulary: いぬ (dog)'
    - position: 3
      title: Lesson 3 — う (u)
      skill_type: character_intro
      objectives:
      - Recognize う by sight and sound
      - Trace う with correct stroke order
      - 'Associate う with vocabulary: うま (horse)'
    - position: 4
      title: Lesson 4 — え (e)
      skill_type: character_intro
      objectives:
      - Recognize え by sight and sound
      - Trace え with correct stroke order
    - position: 5
      title: Lesson 5 — お (o)
      skill_type: character_intro
      objectives:
      - Recognize お by sight and sound
      - Trace お with correct stroke order
    - position: 6
      title: Lesson 6 — Vowel Review
      skill_type: review
      objectives:
      - Distinguish all five vowels by sound
      - Write all five vowels from memory
  - position: 2
    title: Unit 2 — K-row (かきくけこ)
    description: The K-consonant row
    target_items:
      characters:
      - か
      - き
      - く
      - け
      - こ
      vocabulary:
      - かさ
      - きく
      - くも
      - けむり
      - こども
      grammar: []
    lessons:
    - position: 1
      title: Lesson 1 — かきくけこ
      skill_type: character_intro
      objectives:
      - Recognize and write all K-row characters
      - Read words containing K-row characters
    - position: 2
      title: Lesson 2 — K-row Practice
      skill_type: drill
      objectives:
      - Achieve fluent recall of K-row characters
  - position: 3
    title: Unit 3 — S-row (さしすせそ)
    description: The S-consonant row
    target_items:
      characters:
      - さ
      - し
      - す
      - せ
      - そ
      vocabulary:
      - さくら
      - しろ
      - すし
      - せみ
      - そら
      grammar: []
    lessons:
    - position: 1
      title: Lesson 1 — さしすせそ
      skill_type: character_intro
      objectives:
      - Recognize and write all S-row characters
    - position: 2
      title: Lesson 2 — S-row Practice
      skill_type: drill
      objectives:
      - Achieve fluent recall of S-row characters
  - position: 4
    title: Unit 4 — T-row (たちつてと)
    description: The T-consonant row
    target_items:
      characters:
      - た
      - ち
      - つ
      - て
      - と
      vocabulary:
      - たまご
      - ちから
      - つき
      - てがみ
      - ともだち
      grammar: []
    lessons:
    - position: 1
      title: Lesson 1 — たちつてと
      skill_type: character_intro
      objectives:
      - Recognize and write all T-row characters
    - position: 2
      title: Lesson 2 — T-row Practice
      skill_type: drill
      objectives:
      - Achieve fluent recall of T-row characters
  - position: 5
    title: Unit 5 — N-row (なにぬねの)
    description: The N-consonant row
    target_items:
      characters:
      - な
      - に
      - ぬ
      - ね
      - の
      vocabulary:
      - なつ
      - にわ
      - ぬの
      - ねこ
      - のり
      grammar: []
    lessons:
    - position: 1
      title: Lesson 1 — なにぬねの
      skill_type: character_intro
      objectives:
      - Recognize and write all N-row characters
  - position: 6
    title: Unit 6 — H-row (はひふへほ)
    description: The H-consonant row
    target_items:
      characters:
      - は
      - ひ
      - ふ
      - へ
      - ほ
      vocabulary:
      - はな
      - ひと
      - ふね
      - へや
      - ほし
      grammar: []
    lessons:
    - position: 1
      title: Lesson 1 — はひふへほ
      skill_type: character_intro
      objectives:
      - Recognize and write all H-row characters
      - Understand は as topic particle
    - position: 2
      title: 'Lesson 2 — 視写: Copy from Model'
      skill_type: writing
      objectives:
      - Copy hiragana words from a model (視写)
      - Maintain correct stroke order while copying
      - Build fluency transitioning from tracing to independent writing
  - position: 7
    title: Unit 7 — M-row (まみむめも)
    description: The M-consonant row
    target_items:
      characters:
      - ま
      - み
      - む
      - め
      - も
      vocabulary:
      - まち
      - みず
      - むし
      - めだか
      - もり
      grammar: []
    lessons:
    - position: 1
      title: Lesson 1 — まみむめも
      skill_type: character_intro
      objectives:
      - Recognize and write all M-row characters
  - position: 8
    title: Unit 8 — Y/R/W/N rows & Greetings
    description: Remaining hiragana and basic greetings
    target_items:
      characters:
      - や
      - ゆ
      - よ
      - ら
      - り
      - る
      - れ
      - ろ
      - わ
      - を
      - ん
      vocabulary:
      - こんにちは
      - ありがとう
      - さようなら
      - おはよう
      - すみません
      - いただきます
      - ごちそうさま
      grammar:
      - です
    lessons:
    - position: 1
      title: Lesson 1 — やゆよ & らりるれろ
      skill_type: character_intro
      objectives:
      - Recognize and write Y-row and R-row characters
    - position: 2
      title: Lesson 2 — わをん & All Hiragana Review
      skill_type: character_intro
      objectives:
      - Complete the hiragana chart
      - Write all 46 hiragana from memory
    - position: 3
      title: Lesson 3 — Greetings
      skill_type: vocabulary
      objectives:
      - Use こんにちは, ありがとう, さようなら
      - 'Introduce yourself: わたしは___です'
    - position: 4
      title: Lesson 4 — Numbers 1-10
      skill_type: vocabulary
      objectives:
      - Count from 1 to 10 in Japanese
      - Recognize number kanji 一 through 十
    - position: 5
      title: 'Lesson 5 — Listening: Sounds of Japanese'
      skill_type: listening
      objectives:
      - Distinguish all 46 hiragana sounds by ear
      - Identify long vowels vs short vowels
      - Recognize the っ (sokuon) pause in words
    - position: 6
      title: 'Lesson 6 — Speaking: Greetings Practice'
      skill_type: speaking
      objectives:
      - Say こんにちは, ありがとう, さようなら with natural pronunciation
      - 'Introduce yourself: わたしは＿＿です'
    - position: 7
      title: Lesson 7 — Dakuten Preview (がざだば)
      skill_type: character_intro
      objectives:
      - Recognize that voiced sounds exist (が, ざ, だ, ば)
      - Hear the difference between か/が, さ/ざ, た/だ, は/ば
      - Understand that ゛ (dakuten) changes the sound
  - position: 9
    title: Unit 9 — Japanese Pronunciation (発音)
    description: 'Japanese phonological system: vowel length, pitch accent, special sounds'
    target_items:
      characters: []
      vocabulary:
      - おばさん
      - おばあさん
      - きて
      - きって
      - びょういん
      - びよういん
      grammar: []
    lessons:
    - position: 1
      title: Lesson 1 — Vowel Length & Special Sounds
      skill_type: listening
      objectives:
      - Distinguish short vowels from long vowels (おばさん vs おばあさん)
      - Hear and produce っ (sokuon/double consonant)
      - Distinguish ん (syllabic n) in different positions
    - position: 2
      title: Lesson 2 — Pitch Accent Awareness
      skill_type: listening
      objectives:
      - Recognize that Japanese uses pitch accent (not stress)
      - Hear the difference between はし (bridge/chopsticks/edge)
      - Practice natural rhythm of Japanese sentences
  generation_targets:
    target_lessons: 60
    target_vocab: 200
    target_grammar: 20
