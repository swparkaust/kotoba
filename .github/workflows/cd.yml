name: CD

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ vars.REGISTRY_URL }}/kotoba-backend:${{ github.sha }}
            ${{ vars.REGISTRY_URL }}/kotoba-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ vars.REGISTRY_URL }}/kotoba-frontend:${{ github.sha }}
            ${{ vars.REGISTRY_URL }}/kotoba-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/kotoba
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec -T backend bin/rails db:migrate

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            status=$(curl -sf -o /dev/null -w "%{http_code}" ${{ vars.HEALTH_CHECK_URL }} || true)
            [ "$status" = "200" ] && exit 0
            sleep 5
          done
          exit 1
