services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kotoba
      POSTGRES_USER: kotoba
      POSTGRES_PASSWORD: kotoba_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    depends_on: [db, redis]
    environment:
      DATABASE_URL: postgres://kotoba:kotoba_password@db/kotoba
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: production
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    ports:
      - "3000:3000"

  sidekiq:
    build:
      context: ./backend
    command: bundle exec sidekiq
    depends_on: [db, redis]
    environment:
      DATABASE_URL: postgres://kotoba:kotoba_password@db/kotoba
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: production
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}

  frontend:
    build:
      context: ./frontend
    depends_on: [backend]
    environment:
      RAILS_API_URL: http://backend:3000
      NEXT_PUBLIC_CABLE_URL: ws://backend:3000/cable
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    ports:
      - "8080:3000"

volumes:
  pgdata:
